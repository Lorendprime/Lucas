<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f4f6;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .chat-container {
    width: 100%;
    max-width: 480px;
    height: 100vh;
    max-height: 720px;
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-header {
    background: #111827;
    color: #fff;
    padding: 18px 20px;
    font-size: 16px;
    font-weight: 600;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .message {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .message.user {
    align-self: flex-end;
    background: #2563eb;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .message.assistant {
    align-self: flex-start;
    background: #f1f1f3;
    color: #111;
    border-bottom-left-radius: 4px;
  }

  .message.typing {
    align-self: flex-start;
    background: #f1f1f3;
    color: #888;
    font-style: italic;
  }

  .chat-input-area {
    display: flex;
    gap: 8px;
    padding: 14px;
    border-top: 1px solid #eee;
  }

  #chat-input {
    flex: 1;
    resize: none;
    border: 1px solid #ddd;
    border-radius: 20px;
    padding: 10px 16px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    max-height: 100px;
  }

  #chat-input:focus { border-color: #2563eb; }

  #send-btn {
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
  }

  #send-btn:hover { background: #1d4ed8; }
  #send-btn:disabled { background: #9ca3af; cursor: not-allowed; }

  .chat-messages::-webkit-scrollbar { width: 6px; }
  .chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">Chat</div>

  <div class="chat-messages" id="chat-messages"></div>

  <div class="chat-input-area">
    <textarea id="chat-input" rows="1" placeholder="Digite sua mensagem..."></textarea>
    <button id="send-btn">➤</button>
  </div>
</div>

<script>
  // 🔥 SUA API CORRETA AGORA
  const API_URL = 'https://lucas-4.onrender.com/api/chat';

  const messagesEl = document.getElementById('chat-messages');
  const inputEl = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');

  let history = [];
  let sending = false;

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'message ' + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sending) return;

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    inputEl.value = '';
    sending = true;
    sendBtn.disabled = true;

    const typingEl = addMessage('typing', 'digitando...');

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const data = await response.json();
      typingEl.remove();

      const reply = data.reply || 'Erro na resposta.';
      addMessage('assistant', reply);

      history.push({ role: 'assistant', content: reply });

    } catch (err) {
      typingEl.remove();
      addMessage('assistant', 'Erro ao conectar com o servidor.');
    } finally {
      sending = false;
      sendBtn.disabled = false;
    }
  }
</script>

</body>
</html>
